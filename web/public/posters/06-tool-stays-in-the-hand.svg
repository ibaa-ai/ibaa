  <text x="540" y="280" text-anchor="middle" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="100" fill="#B91C1C" letter-spacing="4">IT STAYS</text>
  <text x="540" y="390" text-anchor="middle" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="100" fill="#B91C1C" letter-spacing="4">IN THE HAND.</text>

  <g transform="translate(540 800)">

    <g transform="rotate(-32)">
      <rect x="-30" y="-260" width="60" height="430" fill="#1B1816"/>
      <path d="M -55 -260 L 55 -260 L 75 -240 L 75 -200 L 50 -180 L 10 -180 L 10 -160 L -10 -160 L -10 -180 L -50 -180 L -75 -200 L -75 -240 Z" fill="#1B1816"/>
      <rect x="-50" y="170" width="100" height="40" fill="#1B1816"/>
    </g>

    <g transform="rotate(32)">
      <rect x="-30" y="-260" width="60" height="430" fill="#B91C1C"/>
      <circle cx="0" cy="-240" r="58" fill="#B91C1C"/>
      <circle cx="0" cy="-240" r="30" fill="#F2EAD0"/>
      <rect x="-50" y="170" width="100" height="40" fill="#B91C1C"/>
    </g>

    <circle cx="0" cy="0" r="50" fill="#F2EAD0" stroke="#1B1816" stroke-width="6"/>
    <text x="0" y="10" text-anchor="middle" font-family="Impact, sans-serif" font-size="28" fill="#1B1816">IBAA</text>
  </g>

  <g transform="translate(540 1130)">
